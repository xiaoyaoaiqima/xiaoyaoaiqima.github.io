            <h3> 左值和右值</h3>
            <p>左值是具有持久性的对象</p>
            <p>int x = 1; // x 是左值 <br>
                int& r = x; // x 是左值，r 是 x 的左值引用</p>
                <p>右值是临时的对象，不能取地址对齐进行修改</p>
                <p>int x = 1,y = 2;
                    int z = x + y;   // x+y 是右值
                    int&& r = x + y; // x+y 是右值，r 是 x+y 的右值引用</p>
